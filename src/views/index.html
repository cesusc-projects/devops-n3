<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ENTREGA N3-DEVOPS</title>
    <link rel="stylesheet" href="index.css">
</head>
<body>

    <!-- NAVBAR -->
    <header class="navbar">
        <h1 class="logo">CESUFlix</h1>

        <input 
            type="text" 
            id="searchInput" 
            placeholder="Buscar filmes..."
            onkeydown="if(event.key === 'Enter') buscarFilme()"
        />
    </header>

    <!-- HERO PRINCIPAL -->
    <section class="hero">
        <div class="hero-overlay"></div>
        <div class="hero-content">
            <h2>Bem-vindo ao CESUFlix</h2>
            <p>Seu catálogo inteligente feito pelo Grupo: Luiz Felipe C.Gomes, Pedro Nicoletti e Camila Pereira</p>
        </div>
    </section>

    <!-- RESULTADO DA BUSCA -->
    <section id="resultadoBusca" class="resultado"></section>

    <!-- LISTAS CARROSSEL -->
    <h2 class="categoria-titulo">🔥 Populares</h2>
    <section id="carrosselPopulares" class="carrossel"></section>

    <h2 class="categoria-titulo">⭐ Mais bem avaliados</h2>
    <section id="carrosselAvaliados" class="carrossel"></section>

    <h2 class="categoria-titulo">🎬 Lançamentos</h2>
    <section id="carrosselLancamentos" class="carrossel"></section>

    <!-- MODAL DO TRAILER -->
    <div id="trailerModal" class="modal" onclick="fecharModal(event)">
        <div class="modal-content">
            <span class="close" onclick="fecharModal()">×</span>
            <iframe id="trailerFrame" src="" frameborder="0" allowfullscreen></iframe>
        </div>
    </div>

    <script>
        // ✅ CORRIGIDO: Use o IP da EC2 em vez de localhost
        const API_BASE = "http://54.94.68.159:3000/api";

        // -------------------------------
        // 🔍 BUSCA DINÂMICA - CORRIGIDA
        // -------------------------------
        async function buscarFilme() {
            const titulo = document.getElementById("searchInput").value.trim();
            if (!titulo) {
                alert("Por favor, digite o nome de um filme!");
                return;
            }

            try {
                console.log(`🔍 Buscando: ${titulo}`);
                const res = await fetch(`${API_BASE}/filmes/${encodeURIComponent(titulo)}`);
                
                if (!res.ok) {
                    const errorData = await res.json();
                    throw new Error(errorData.erro || `Erro HTTP: ${res.status}`);
                }
                
                const data = await res.json();
                console.log("✅ Dados recebidos:", data);

                // ✅ CORRIGIDO: Exibir dados conforme estrutura do App.js
                document.getElementById("resultadoBusca").innerHTML = `
                    <div class="card-detalhe">
                        <h2>${data.titulo || 'Título não disponível'}</h2>
                        <p><strong>Lançamento:</strong> ${data.lancamento || 'N/A'}</p>
                        <p><strong>Sinopse:</strong> ${data.sinopse || 'Sinopse não disponível.'}</p>

                        ${data.poster ? `<img src="${data.poster}" alt="${data.titulo}" style="max-width: 300px; margin: 1rem 0; border-radius: 8px;">` : ''}

                        <div class="notas">
                            <h3>Avaliações:</h3>
                            ${data.notasOMDb ? `
                                <span>⭐ IMDb: ${data.notasOMDb.imdb || "N/A"}</span>
                                <span>🍅 Rotten Tomatoes: ${data.notasOMDb.rottenTomatoes || "N/A"}</span>
                                <span>🎯 Metacritic: ${data.notasOMDb.metacritic || "N/A"}</span>
                            ` : '<span>❌ Avaliações não disponíveis</span>'}
                        </div>

                        ${data.trailer ? 
                            `<button class="trailer-btn" onclick="abrirTrailer('${data.trailer}')">🎬 Assistir Trailer</button>`
                            : `<p class="no-trailer">🚫 Trailer não disponível</p>`
                        }
                    </div>
                `;

            } catch (error) {
                console.error("❌ Erro na busca:", error);
                document.getElementById("resultadoBusca").innerHTML = `
                    <div class="erro">
                        <h3>❌ Erro ao buscar filme</h3>
                        <p>${error.message}</p>
                        <p>Tente novamente com outro título.</p>
                    </div>
                `;
            }
        }

        // -------------------------------
        // 🎥 MODAL DO TRAILER - CORRIGIDO
        // -------------------------------
        function abrirTrailer(url) {
            if (!url) {
                alert("Trailer não disponível para este filme.");
                return;
            }
            
            document.getElementById("trailerModal").style.display = "flex";
            // ✅ CORRIGIDO: Converter URL do YouTube para embed
            const embedUrl = url.replace("watch?v=", "embed/");
            document.getElementById("trailerFrame").src = embedUrl;
        }

        function fecharModal(event) {
            // ✅ CORRIGIDO: Fechar apenas se clicar fora do conteúdo
            if (event && event.target !== document.getElementById("trailerModal")) return;
            
            document.getElementById("trailerModal").style.display = "none";
            document.getElementById("trailerFrame").src = ""; // Para o vídeo
        }

        // -------------------------------
        // 🎞️ FILMES POPULARES DA SUA API
        // -------------------------------
        async function carregarFilmesPopulares() {
            try {
                console.log("📍 Carregando filmes populares...");
                const res = await fetch(`${API_BASE}/populares`);
                
                if (!res.ok) {
                    throw new Error(`Erro ao carregar populares: ${res.status}`);
                }
                
                const filmes = await res.json();
                console.log("✅ Filmes populares:", filmes);

                const container = document.getElementById("carrosselPopulares");
                container.innerHTML = filmes
                    .slice(0, 10) // Limitar a 10 filmes
                    .map(filme => `
                        <div class="card" onclick="buscarCard('${filme.title.replace(/'/g, "\\'")}')">
                            <img src="https://image.tmdb.org/t/p/w500${filme.poster_path}" alt="${filme.title}" onerror="this.src='https://via.placeholder.com/500x750/333/fff?text=Imagem+Não+Disponível'">
                            <span>${filme.title}</span>
                        </div>
                    `)
                    .join("");

            } catch (error) {
                console.error("❌ Erro ao carregar populares:", error);
                document.getElementById("carrosselPopulares").innerHTML = `
                    <div class="erro">
                        <p>Erro ao carregar filmes populares: ${error.message}</p>
                    </div>
                `;
            }
        }

        // -------------------------------
        // 📌 CARROSSEIS TMDB (FALLBACK)
        // -------------------------------
        async function carregarCarrosselFallback(endpoint, containerId, titulo) {
            try {
                const url = `https://api.themoviedb.org/3${endpoint}?api_key=2cc5de7d5097e69d76342a0dfbff39ab&language=pt-BR`;

                const res = await fetch(url);
                const data = await res.json();

                const container = document.getElementById(containerId);
                container.innerHTML = data.results
                    .slice(0, 10)
                    .map(filme => `
                        <div class="card" onclick="buscarCard('${filme.title.replace(/'/g, "\\'")}')">
                            <img src="https://image.tmdb.org/t/p/w500${filme.poster_path}" alt="${filme.title}" onerror="this.src='https://via.placeholder.com/500x750/333/fff?text=Imagem+Não+Disponível'">
                            <span>${filme.title}</span>
                        </div>
                    `)
                    .join("");
            } catch (error) {
                console.error(`❌ Erro carregar ${containerId}:`, error);
                document.getElementById(containerId).innerHTML = `
                    <div class="erro">
                        <p>Erro ao carregar ${titulo}</p>
                    </div>
                `;
            }
        }

        // -------------------------------
        // 🎯 BUSCA POR CLIQUE NO CARD
        // -------------------------------
        async function buscarCard(titulo) {
            document.getElementById("searchInput").value = titulo;
            await buscarFilme();
            window.scrollTo({ top: document.getElementById("resultadoBusca").offsetTop - 100, behavior: 'smooth' });
        }

        // -------------------------------
        // 🚀 INICIALIZAÇÃO
        // -------------------------------
        async function inicializar() {
            console.log("🚀 Inicializando CESUFlix...");
            
            // Testar conexão com a API
            try {
                const statusRes = await fetch(`${API_BASE}/status`);
                const statusData = await statusRes.json();
                console.log("✅ API Status:", statusData);
            } catch (error) {
                console.error("❌ API não responde:", error);
                alert("⚠️ A API não está respondendo. Verifique se o servidor está online.");
            }

            // Carregar filmes populares da SUA API
            await carregarFilmesPopulares();
            
            // Carregar outros carrosséis como fallback
            carregarCarrosselFallback("/movie/top_rated", "carrosselAvaliados", "filmes bem avaliados");
            carregarCarrosselFallback("/movie/upcoming", "carrosselLancamentos", "lançamentos");
        }

        // Iniciar quando a página carregar
        document.addEventListener('DOMContentLoaded', inicializar);
    </script>
</body>
</html>
